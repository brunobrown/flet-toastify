<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 294 388" width="294" height="388" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter%2C%20system-ui%2C%20sans-serif:wght@400;500;600;700&amp;display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;display=swap');
  text { font-family: 'Inter, system-ui, sans-serif', system-ui, sans-serif; }
  .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', ui-monospace, monospace; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="cls-inherit" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto-start-reverse">
    <polygon points="0 0, 12 5, 0 10" fill="var(--bg)" stroke="var(--_arrow)" stroke-width="1.5" />
  </marker>
  <marker id="cls-composition" markerWidth="12" markerHeight="10" refX="0" refY="5" orient="auto-start-reverse">
    <polygon points="6 0, 12 5, 6 10, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
  <marker id="cls-aggregation" markerWidth="12" markerHeight="10" refX="0" refY="5" orient="auto-start-reverse">
    <polygon points="6 0, 12 5, 6 10, 0 5" fill="var(--bg)" stroke="var(--_arrow)" stroke-width="1.5" />
  </marker>
  <marker id="cls-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto-start-reverse">
    <polyline points="0 0, 8 3, 0 6" fill="none" stroke="var(--_arrow)" stroke-width="1.5" />
  </marker>
</defs>
<polyline class="class-relationship" data-from="flet_toastify_models" data-to="flet_toastify_types" data-type="association" data-marker-at="to" points="147,144 147,204" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#cls-arrow)" />
<g class="class-node" data-id="flet_toastify_models" data-label="flet_toastify_models" data-annotation="module">
  <rect x="40" y="40" width="214" height="104" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="40" y="40" width="214" height="48" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="147" y="52" text-anchor="middle" dy="0.35em" font-size="10" font-weight="500" font-style="italic" fill="var(--_text-muted)">&lt;&lt;module&gt;&gt;</text>
  <text x="147" y="70" text-anchor="middle" font-size="13" font-weight="700" fill="var(--_text)" dy="4.55">flet_toastify_models</text>
  <line x1="40" y1="88" x2="254" y2="88" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="48" y="102" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">flet_toastify.models</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">module</tspan></text>
  <text x="48" y="122" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">Toast</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">class</tspan></text>
  <line x1="40" y1="136" x2="254" y2="136" stroke="var(--_node-stroke)" stroke-width="0.75" />
</g>
<g class="class-node" data-id="flet_toastify_types" data-label="flet_toastify_types" data-annotation="module">
  <rect x="43.3" y="204" width="207.4" height="144" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="43.3" y="204" width="207.4" height="48" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="147" y="216" text-anchor="middle" dy="0.35em" font-size="10" font-weight="500" font-style="italic" fill="var(--_text-muted)">&lt;&lt;module&gt;&gt;</text>
  <text x="147" y="234" text-anchor="middle" font-size="13" font-weight="700" fill="var(--_text)" dy="4.55">flet_toastify_types</text>
  <line x1="43.3" y1="252" x2="250.7" y2="252" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="51.3" y="266" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">flet_toastify.types</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">module</tspan></text>
  <text x="51.3" y="286" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">ToastType</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">class</tspan></text>
  <text x="51.3" y="306" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">ToastPhase</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">class</tspan></text>
  <text x="51.3" y="326" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">Position</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">class</tspan></text>
  <line x1="43.3" y1="340" x2="250.7" y2="340" stroke="var(--_node-stroke)" stroke-width="0.75" />
</g>

</svg>
