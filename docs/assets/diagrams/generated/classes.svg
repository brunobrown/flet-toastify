  <text x="48" y="166" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">BOTTOM_CENTER</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">Any</tspan></text>
  <text x="48" y="186" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">BOTTOM_RIGHT</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">Any</tspan></text>
  <line x1="40" y1="200" x2="188" y2="200" stroke="var(--_node-stroke)" stroke-width="0.75" />
</g>
<g class="class-node" data-id="ToastPhase" data-label="ToastPhase">
  <rect x="212.73333333333332" y="268" width="120" height="108" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="212.73333333333332" y="268" width="120" height="32" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="272.73333333333335" y="284" text-anchor="middle" font-size="13" font-weight="700" fill="var(--_text)" dy="4.55">ToastPhase</text>
