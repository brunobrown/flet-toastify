  <text x="380.73333333333335" y="374" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">ERROR</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">Any</tspan></text>
  <line x1="372.73333333333335" y1="388" x2="492.73333333333335" y2="388" stroke="var(--_node-stroke)" stroke-width="0.75" />
