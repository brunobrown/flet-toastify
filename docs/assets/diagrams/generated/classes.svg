  <line x1="208" y1="180" x2="402.2" y2="180" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="216" y="194" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">with_phase(phase)</tspan></text>
