  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="_start" data-to="ENTERING" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="show() / info() / success() / warning() / error()" points="305.919,76 305.919,224.3" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
