repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: local
    hooks:
      - id: lizard-complexity
        name: lizard complexity
        entry: uv tool run lizard src tests -C 10
        language: system
        pass_filenames: false

      - id: ty-check
        name: ty check
        entry: uv tool run ty check
        language: system
        pass_filenames: false

      - id: docstring-coverage
        name: docstring coverage
        entry: uv run python scripts/check_docstring_coverage.py --paths src --fail-under 100
        language: system
        pass_filenames: false

      - id: api-reference-coverage
        name: api reference coverage
        entry: uv run python scripts/check_api_reference_coverage.py --root src/flet_toastify --reference docs/reference/api.md --package flet_toastify
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        stages: [ pre-push ]
